<svg width="680" height="244" viewBox="0 0 680 244" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B00FF"/>
      <stop offset="50%"  stop-color="#FF00C7"/>
      <stop offset="100%" stop-color="#FF4D00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="244" rx="10" fill="#0D0D0D"/>

  <!-- Gradient border -->
  <rect width="680" height="244" rx="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.45"/>

  <!-- Title bar -->
  <rect width="680" height="32" rx="10" fill="#131313"/>
  <rect y="22" width="680" height="10" fill="#131313"/>

  <!-- Window dots -->
  <circle cx="20" cy="16" r="5" fill="#FF4D00" opacity="0.9" filter="url(#glow)"/>
  <circle cx="36" cy="16" r="5" fill="#EC4899" opacity="0.9" filter="url(#glow)"/>
  <circle cx="52" cy="16" r="5" fill="#A855F7" opacity="0.9" filter="url(#glow)"/>

  <!-- Title -->
  <text x="340" y="21" text-anchor="middle" font-size="11" fill="#3D3D3D"
        font-family="'Fira Code','Consolas','Courier New',monospace">Eaquo@dev: ~</text>

  <!-- ── git status ──────────────────────────────────── -->

  <text x="24" y="58" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#A855F7" filter="url(#glow)">$</tspan>
    <tspan fill="#E2E8F0"> Eaquo</tspan>
    <tspan fill="#EC4899">@dev</tspan>
    <tspan fill="#A855F7">:~$ </tspan>
    <tspan fill="#EC4899">git status</tspan>
  </text>

  <text x="24" y="80" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#6B7280"> On branch: </tspan>
    <tspan fill="#F97316">hyprland-dotfiles</tspan>
  </text>

  <!-- Separator 1 -->
  <rect x="24" y="92" width="632" height="1" fill="url(#grad)" opacity="0.35"/>

  <text x="24" y="116" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#A855F7" filter="url(#glow)"> ⬡  </tspan>
    <tspan fill="#E2E8F0">Hyprland dotfiles</tspan>
    <tspan fill="#EC4899">  ──  </tspan>
    <tspan fill="#9CA3AF">Quickshell · QML · Bash</tspan>
  </text>

  <text x="24" y="138" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace" fill="#4B5563">
    <tspan>     Full desktop environment built from scratch.</tspan>
  </text>

  <text x="24" y="160" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace" fill="#4B5563">
    <tspan>     Widgets, bars, animations — everything custom.</tspan>
  </text>

  <!-- Separator 2 -->
  <rect x="24" y="171" width="632" height="1" fill="url(#grad)" opacity="0.35"/>

  <!-- Progress bar with gradient pseudo-coloring -->
  <text x="24" y="196" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#6B7280">  [ </tspan>
    <tspan fill="#8B00FF">███</tspan>
    <tspan fill="#B030E0">███</tspan>
    <tspan fill="#EC4899">███</tspan>
    <tspan fill="#F97316">███</tspan>
    <tspan fill="#2A2A2A">████████</tspan>
    <tspan fill="#6B7280"> ]  </tspan>
    <tspan fill="#EC4899">~65%</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="24" y="204" width="8" height="14" rx="1" fill="#A855F7">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
