<svg width="680" height="258" viewBox="0 0 680 258" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B00FF"/>
      <stop offset="50%"  stop-color="#FF00C7"/>
      <stop offset="100%" stop-color="#FF4D00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="258" rx="10" fill="#0D0D0D"/>

  <!-- Gradient border -->
  <rect width="680" height="258" rx="10" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.45"/>

  <!-- Title bar -->
  <rect width="680" height="32" rx="10" fill="#131313"/>
  <rect y="22" width="680" height="10" fill="#131313"/>

  <!-- Window dots -->
  <circle cx="20" cy="16" r="5" fill="#FF4D00" opacity="0.9" filter="url(#glow)"/>
  <circle cx="36" cy="16" r="5" fill="#EC4899" opacity="0.9" filter="url(#glow)"/>
  <circle cx="52" cy="16" r="5" fill="#A855F7" opacity="0.9" filter="url(#glow)"/>

  <!-- Title -->
  <text x="340" y="21" text-anchor="middle" font-size="11" fill="#3D3D3D"
        font-family="'Fira Code','Consolas','Courier New',monospace">Eaquo@dev: ~</text>

  <!-- ── whoami ──────────────────────────────────────── -->

  <text x="24" y="58" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#A855F7" filter="url(#glow)">$</tspan>
    <tspan fill="#E2E8F0"> Eaquo</tspan>
    <tspan fill="#EC4899">@dev</tspan>
    <tspan fill="#A855F7">:~$ </tspan>
    <tspan fill="#EC4899">whoami</tspan>
  </text>

  <text x="24" y="80" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#E2E8F0">  Linux developer </tspan>
    <tspan fill="#3D3D3D">— </tspan>
    <tspan fill="#9CA3AF">open source contributor</tspan>
  </text>

  <text x="24" y="102" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#6B7280">  Building desktop experiences with </tspan>
    <tspan fill="#A855F7">Quickshell</tspan>
    <tspan fill="#6B7280"> &amp; </tspan>
    <tspan fill="#EC4899">QML</tspan>
    <tspan fill="#6B7280"> on </tspan>
    <tspan fill="#F97316">Hyprland</tspan>
  </text>

  <text x="24" y="124" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#6B7280">  </tspan>
    <tspan fill="#60A5FA">Python</tspan>
    <tspan fill="#6B7280"> tooling for backend automation</tspan>
  </text>

  <!-- ── philosophy ─────────────────────────────────── -->

  <text x="24" y="152" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#A855F7" filter="url(#glow)">$</tspan>
    <tspan fill="#E2E8F0"> Eaquo</tspan>
    <tspan fill="#EC4899">@dev</tspan>
    <tspan fill="#A855F7">:~$ </tspan>
    <tspan fill="#EC4899">cat philosophy.txt</tspan>
  </text>

  <text x="24" y="174" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace" fill="#6B7280">
    <tspan>  Build things that just work.</tspan>
  </text>

  <text x="24" y="196" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace" fill="#6B7280">
    <tspan>  Keep it minimal. Keep it fast.</tspan>
  </text>

  <text x="24" y="218" font-size="13" font-family="'Fira Code','Consolas','Courier New',monospace">
    <tspan fill="#6B7280">  Make it simple, but </tspan>
    <tspan fill="#F97316" font-weight="bold">significant.</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="24" y="226" width="8" height="14" rx="1" fill="#A855F7">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
