<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B00FF"/>
      <stop offset="50%" stop-color="#FF00C7"/>
      <stop offset="100%" stop-color="#FF4D00"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes pulseRing {
        0%, 100% { opacity: 1; stroke-width: 18px; }
        50%       { opacity: 0.6; stroke-width: 10px; }
      }
      @keyframes pulseGlowRing {
        0%, 100% { opacity: 0.5; stroke-width: 34px; }
        50%       { opacity: 0.15; stroke-width: 20px; }
      }
      @keyframes rotateSlow {
        from { transform: rotate(0deg); transform-origin: 256px 256px; }
        to   { transform: rotate(360deg); transform-origin: 256px 256px; }
      }
      @keyframes flickerE {
        0%, 95%, 100% { opacity: 1; }
        96%            { opacity: 0.4; }
        98%            { opacity: 1; }
        99%            { opacity: 0.6; }
      }
      @keyframes cursorBlink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes dash {
        from { stroke-dashoffset: 1480; }
        to   { stroke-dashoffset: 0; }
      }

      .ring-glow {
        animation: pulseGlowRing 3s ease-in-out infinite;
      }
      .ring-main {
        animation: pulseRing 3s ease-in-out infinite;
      }
      .ring-rotate {
        animation: rotateSlow 12s linear infinite;
      }
      .letter-e {
        animation: flickerE 6s ease-in-out infinite;
      }
      .cursor {
        animation: cursorBlink 1s step-end infinite;
      }
      .letter-o {
        animation: fadeInUp 0.8s ease-out 0.3s both;
      }
      .ring-draw {
        stroke-dasharray: 1480;
        stroke-dashoffset: 1480;
        animation: dash 2s ease-out 0.1s forwards;
      }
    </style>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#0A0A0A"/>

  <!-- Outer glow halo (blurred, rotates slowly) -->
  <circle
    cx="256" cy="256" r="235"
    stroke="url(#circleGradient)"
    stroke-width="34"
    fill="none"
    filter="url(#glowStrong)"
    class="ring-glow ring-rotate"/>

  <!-- Main animated ring (draw on load) -->
  <circle
    cx="256" cy="256" r="235"
    stroke="url(#circleGradient)"
    stroke-width="18"
    fill="none"
    filter="url(#glow)"
    class="ring-main ring-draw"/>

  <!-- Inner dark circle -->
  <circle cx="256" cy="256" r="218" fill="#0A0A0A"/>

  <!-- "E" letter with flicker -->
  <path
    d="M130 175 L130 335 L228 335 L228 293 L170 293 L170 267 L220 267 L220 225 L170 225 L170 197 L228 197 L228 175 Z"
    fill="url(#textGradient)"
    filter="url(#glow)"
    class="letter-e"/>

  <!-- "o" letter -->
  <ellipse
    cx="316" cy="255"
    rx="66" ry="78"
    fill="none"
    stroke="#F1F5F9"
    stroke-width="28"
    filter="url(#glow)"
    class="letter-o"/>

  <!-- Terminal prompt accent ">_" -->
  <path d="M368 165 L390 182 L368 199" stroke="#FF00C7" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <line x1="393" y1="182" x2="414" y2="182" stroke="#FF6B00" stroke-width="6" stroke-linecap="round" filter="url(#glow)" class="cursor"/>

  <!-- Bottom underline -->
  <line x1="130" y1="348" x2="382" y2="348" stroke="url(#circleGradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

</svg>
